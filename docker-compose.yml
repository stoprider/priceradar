services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: priceradar_th
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d priceradar_th"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/priceradar_th?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: replace-with-a-long-random-secret
      SESSION_SECRET: replace-with-a-long-random-secret
      TELEGRAM_BOT_TOKEN: ""
      TELEGRAM_CHAT_ID: ""
    ports:
      - "3000:3000"
    command: >
      sh -c "npm run db:push && npm run db:seed && npm start"

volumes:
  postgres_data:
